services:
  - type: web
    name: sk-pro-backend
    runtime: node
    rootDir: server
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /api/readyz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: LOG_LEVEL
        value: info
      - key: CLIENT_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: REDIS_URL
        sync: false
