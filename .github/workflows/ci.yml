name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'hotfix/**'
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

jobs:
  # ============================================
  # SECURITY AUDIT
  # ============================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      
      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          cd client && npm install --legacy-peer-deps
          cd ../server && npm install --legacy-peer-deps

      - name: Run npm audit
        # Continue on error because audit failures shouldn't always block (unless critical)
        run: npm run audit:ci || true

  # ============================================
  # LINT & TYPE CHECK
  # ============================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          cd client && npm install --legacy-peer-deps
          cd ../server && npm install --legacy-peer-deps

      - name: Lint (Client & Server)
        run: |
          cd client && npm run lint
          cd ../server && npm run lint

      - name: Type Check (Client & Server)
        run: |
          cd client && npm run type-check
          cd ../server && npm run type-check

  # ============================================
  # UNIT TESTS
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          cd client && npm install --legacy-peer-deps
          cd ../server && npm install --legacy-peer-deps

      - name: Client Tests
        run: cd client && npm run test:ci:stable

      - name: Server Tests
        run: cd server && npm run test:coverage:ci

      # Upload coverage if needed (Codecov token required in secrets)
      # - name: Upload coverage
      #   uses: codecov/codecov-action@v3
      #   ...

  # ============================================
  # E2E TESTS (Cypress)
  # ============================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint, unit-tests] # Run E2E only if basic checks pass
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          cd client && npm install --legacy-peer-deps
          cd ../server && npm install --legacy-peer-deps

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.10.0
        with:
          mongodb-version: '7.0'

      - name: Build & Start Backend
        run: |
          cd server
          npm run build
          npm start &
        env:
          MONGODB_URI: mongodb://localhost:27017/skproduction-test
          JWT_SECRET: test-secret
          NODE_ENV: test
          PORT: 5001

      - name: Wait for Backend Ready
        run: |
          npx wait-on http://127.0.0.1:5001/api/health --timeout 120000

      - name: Seed Site Content (for SSG)
        run: |
          cd server
          MONGO_URI=mongodb://127.0.0.1:27017/skproduction-test node dist/scripts/seedSiteContent.js
        env:
          MONGO_URI: mongodb://127.0.0.1:27017/skproduction-test
          NODE_ENV: test

      - name: Seed E2E Test User
        run: |
          cd server
          MONGODB_URI=mongodb://127.0.0.1:27017/skproduction-test node dist/scripts/seedTestUser.js
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/skproduction-test
          NODE_ENV: test

      - name: Build & Start Frontend
        run: |
          cd client
          export NEXT_PUBLIC_API_URL=http://127.0.0.1:5001/api
          export NEXT_PUBLIC_BACKEND_URL=http://127.0.0.1:5001
          npm run build
          ls -R out > ../out-structure.txt
          npx serve -l 3000 out &
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:5001/api
          NEXT_PUBLIC_BACKEND_URL: http://127.0.0.1:5001
          PORT: 3000

      - name: Wait for Frontend Ready
        run: |
          npx wait-on http://127.0.0.1:3000 --timeout 120000

      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          working-directory: client
          install: false
          # Servers are already started above
          wait-on: 'http://127.0.0.1:3000'
          command: npx cypress run --reporter spec --spec cypress/e2e/smoke-tests.cy.ts | tee ../cypress-output.txt 2>&1
        env:
          CYPRESS_baseUrl: http://127.0.0.1:3000
          DEBUG: cypress:runner

      - name: Upload Logs & Structure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-debug-info
          path: |
            cypress-output.txt
            out-structure.txt
            client/cypress/screenshots/
            client/cypress/videos/

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: client/cypress/screenshots

  # ============================================
  # BUILD CHECK
  # ============================================
  build:
    name: Production Build Check
    runs-on: ubuntu-latest
    needs: [unit-tests] # Parallel with E2E
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          cd client && npm install --legacy-peer-deps
          cd ../server && npm install --legacy-peer-deps

      - name: Build Client
        run: cd client && npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.skproduction.com/api # Placeholder for build
          NEXT_PUBLIC_BACKEND_URL: https://api.skproduction.com

      - name: Build Server
        run: cd server && npm run build
