name: Electron Release Build

on:
  push:
    tags:
      - 'v*' # Sadece v ile başlayan tag'ler tetikler (Örn: v1.0.1)
  workflow_dispatch: # Manuel tetiklemeye izin verir

permissions:
  contents: write

env:
  NODE_VERSION: '20.x'

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    
    steps:
      - name: Kodu Checkout Yap
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Bağımlılıkları Yükle
        working-directory: ./client
        run: npm install --legacy-peer-deps

      - name: Next.js Projesini Derle
        working-directory: ./client
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Electron Builder ile Windows (.exe) Paketle ve Yayınla
        working-directory: ./client
        run: npx electron-builder --win --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build for macOS
    runs-on: macos-latest
    
    steps:
      - name: Kodu Checkout Yap
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Bağımlılıkları Yükle
        working-directory: ./client
        run: npm install --legacy-peer-deps

      - name: Next.js Projesini Derle
        working-directory: ./client
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Electron Builder ile macOS (.dmg) Paketle ve Yayınla
        working-directory: ./client
        run: npx electron-builder --mac --publish always
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
