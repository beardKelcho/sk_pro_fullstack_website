name: Deploy

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  on-success:
    name: Build, Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Server Dependencies
        working-directory: ./server
        run: npm ci

      - name: Install Client Dependencies
        working-directory: ./client
        run: npm ci

      - name: Typecheck Server
        working-directory: ./server
        run: npm run build

      - name: Typecheck Client
        working-directory: ./client
        run: npm run build

      - name: Lint Server
        working-directory: ./server
        run: npm run lint

      - name: Test Server
        working-directory: ./server
        run: npm test

      - name: Test Client
        working-directory: ./client
        run: npm test
  # ============================================
  # STAGING DEPLOYMENT
  # ============================================
  deploy-staging:
    needs: [on-success]
    if: ${{ github.ref == 'refs/heads/develop' }}
    name: Deploy to Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      # Just trigger the hooks, no need to rebuild/retest if CI passed
      - name: Trigger Render deploy hook (staging)
        env:
          DEPLOY_HOOK: ${{ secrets['RENDER_STAGING_DEPLOY_HOOK_URL'] }} # actionlint-disable-line
        run: |
          if [ -n "$DEPLOY_HOOK" ]; then
            curl -X POST "$DEPLOY_HOOK"
          fi

      - name: Trigger Vercel deploy hook (staging)
        env:
          DEPLOY_HOOK: ${{ secrets['VERCEL_STAGING_DEPLOY_HOOK_URL'] }} # actionlint-disable-line
        run: |
          if [ -n "$DEPLOY_HOOK" ]; then
            curl -X POST "$DEPLOY_HOOK"
          fi

      - name: Notification
        run: echo "🚀 Staging deployment triggered"

  # ============================================
  # PRODUCTION DEPLOYMENT
  # ============================================
  deploy-production:
    needs: [on-success]
    if: ${{ github.ref == 'refs/heads/main' }}
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://skpro.com.tr
    steps:
      - uses: actions/checkout@v6

      - name: Trigger Render deploy hook (production)
        env:
          DEPLOY_HOOK: ${{ secrets['RENDER_PRODUCTION_DEPLOY_HOOK_URL'] }} # actionlint-disable-line
        run: |
          if [ -n "$DEPLOY_HOOK" ]; then
            curl -X POST "$DEPLOY_HOOK"
          fi

      - name: Trigger Vercel deploy hook (production)
        env:
          DEPLOY_HOOK: ${{ secrets['VERCEL_PRODUCTION_DEPLOY_HOOK_URL'] }} # actionlint-disable-line
        run: |
          if [ -n "$DEPLOY_HOOK" ]; then
            curl -X POST "$DEPLOY_HOOK"
          fi
      
      - name: Create Release Tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git tag -a "v$(date +%Y.%m.%d)-${{ github.sha }}" -m "Deploy"
          git push origin --tags
        continue-on-error: true

      - name: Notification
        run: echo "🚀 Production deployment triggered"
