name: Bug report
description: Report a reproducible problem in the project
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please share enough detail for us to reproduce it safely.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short description of the bug
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Client
        - Server
        - Mobile
        - CI/CD
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a minimal sequence of steps
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, device, OS, app version, or commit if relevant
      placeholder: Chrome 134, macOS 15, main@abcdef1
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste errors or attach screenshots if available
